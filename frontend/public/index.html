<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự đoán Giá Vé Máy Bay</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; color: green; text-align: center; font-size: 18px;}
        #error { margin-top: 20px; color: red; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">✈️ Đặt Vé Máy Bay</h2>
        <form id="flightForm">
            <div class="form-group">
                <label>Hãng hàng không:</label>
                <select id="airline">
                    <option value="">-- Chọn Hãng --</option>
                    <option value="IndiGo">IndiGo</option>
                    <option value="Air India">Air India</option>
                    <option value="Jet Airways">Jet Airways</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nơi đi:</label>
                <select id="source">
                    <option value="">-- Chọn Nơi Đi --</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Banglore">Banglore</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nơi đến:</label>
                <select id="destination">
                    <option value="">-- Chọn Nơi Đến --</option>
                    <option value="Cochin">Cochin</option>
                    <option value="New Delhi">New Delhi</option>
                </select>
            </div>
            <div class="form-group">
                <label>Thời gian bay (Giờ):</label>
                <input type="number" id="duration" step="0.1" placeholder="Ví dụ: 2.5">
            </div>
            <div class="form-group">
                <label>Số trạm dừng:</label>
                <select id="total_stops">
                    <option value="0">0 (Bay thẳng)</option>
                    <option value="1">1 trạm</option>
                    <option value="2">2 trạm</option>
                </select>
            </div>
            <button type="submit">Dự Đoán Giá Vé</button>
        </form>
        <div id="result"></div>
        <div id="error"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
